name: tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core pydantic + dev/pytest + code/tree-sitter extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,code]'

      - name: Show versions
        run: |
          python --version
          python -c "import sqlite3, pydantic; print('sqlite', sqlite3.sqlite_version, '| pydantic', pydantic.VERSION)"

      - name: Run tests
        run: pytest -q
