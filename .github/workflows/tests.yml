name: tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core pydantic + dev/pytest + code/tree-sitter + vector/sqlite-vec extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,code,vector]'

      - name: Show versions
        run: |
          python --version
          python -c "import sqlite3, pydantic; print('sqlite', sqlite3.sqlite_version, '| pydantic', pydantic.VERSION)"

      - name: Run tests
        run: pytest -q

  # Non-editable install smoke test: an editable install (the job above) keeps src/ as the import
  # root and so cannot catch missing package-data / find-packages gaps. This builds the wheel and
  # imports it from a clean dir, which is what a real `pip install memorydb` does (guards PR1-1).
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build the wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Assert schema.sql is packaged
        run: python -c "import zipfile, glob; w=glob.glob('dist/*.whl')[0]; names=zipfile.ZipFile(w).namelist(); assert any(n.endswith('memorydb/schema.sql') for n in names), names; print('schema.sql packaged OK')"

      - name: Install the wheel (core only — no extras) and smoke it
        run: |
          pip install dist/*.whl
          cd "$RUNNER_TEMP"   # import from site-packages, NOT the source tree
          python -c "import memorydb; print('memorydb', memorydb.__version__)"
          # exercise the adapters subpackage + a real index so a dropped/renamed package is caught,
          # not just the top-level import (MR-16).
          python - <<'PY'
          import os, tempfile
          from memorydb.adapters.code.python_resolver import PythonResolver
          from memorydb import MemoryDB
          d = tempfile.mkdtemp()
          open(os.path.join(d, "m.py"), "w").write("def a():\n    return b()\n\ndef b():\n    return 1\n")
          db = MemoryDB.open(":memory:")
          rep = db.index(d)
          assert rep.files_indexed == 1 and rep.edges_upserted >= 1, rep
          print("adapters subpackage + index OK:", rep.edges_upserted, "edges")
          PY
          memorydb --help > /dev/null
          memorydb-eval --help > /dev/null
          echo "console scripts + adapters + index OK"
